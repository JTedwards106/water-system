spring:
  application:
    name: aquasmart-backend
  datasource:
    url: jdbc:h2:mem:aquasmart
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  # kafka:
  #   bootstrap-servers: localhost:9092
  #   consumer:
  #     group-id: aquasmart-group
  #     auto-offset-reset: earliest
  #     key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  #     value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  snowflake:
    url: ${SNOWFLAKE_URL:jdbc:snowflake://account.snowflakecomputing.com}
    user: ${SNOWFLAKE_USER:user}
    password: ${SNOWFLAKE_PASSWORD:password}
    database: ${SNOWFLAKE_DATABASE:AQUASMART_DB}
    schema: ${SNOWFLAKE_SCHEMA:PUBLIC}
    warehouse: ${SNOWFLAKE_WAREHOUSE:COMPUTE_WH}
    role: ${SNOWFLAKE_ROLE:ACCOUNTADMIN}

server:
  port: 8085

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.aquasmart: DEBUG
  file:
    name: logs/aquasmart.log
